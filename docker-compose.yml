version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: casino-postgres
    environment:
      POSTGRES_DB: casino
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: casino-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
