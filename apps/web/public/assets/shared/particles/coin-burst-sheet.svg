    <ellipse cx="0" cy="0" rx="5" ry="24" fill="url(#gold)" stroke="#ffd700" stroke-width="1.5"/>
    <rect x="-2.5" y="-20" width="5" height="40" fill="url(#gold-bright)" opacity="0.7"/>
