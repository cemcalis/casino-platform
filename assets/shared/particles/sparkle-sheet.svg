      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Frame 0 -->
  <g transform="translate(16, 16) scale(0.15)" filter="url(#glow)">
