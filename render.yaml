databases:
  - name: casino-db
    databaseName: casino
    user: casino
    plan: free
    region: oregon

services:
  # ── NestJS API ───────────────────────────────────────────────────────────────
  - type: web
    name: casino-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.15.0 && pnpm install --frozen-lockfile && pnpm --filter @casino/api... build && cd services/api && npx prisma migrate deploy
    startCommand: cd services/api && node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: casino-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_URL
        sync: false

  # ── Next.js Web App ──────────────────────────────────────────────────────────
  - type: web
    name: casino-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.15.0 && pnpm install --frozen-lockfile && pnpm --filter @casino/web... build
    startCommand: cd apps/web && pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_DEMO_MODE
        sync: false

  # ── Admin Panel ──────────────────────────────────────────────────────────────
  - type: web
    name: casino-admin
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.15.0 && pnpm install --frozen-lockfile && pnpm --filter @casino/admin... build
    startCommand: cd apps/admin && pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ── Finance Panel ─────────────────────────────────────────────────────────────
  - type: web
    name: casino-finance
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.15.0 && pnpm install --frozen-lockfile && pnpm --filter @casino/finance... build
    startCommand: cd apps/finance && pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ── Support Panel ─────────────────────────────────────────────────────────────
  - type: web
    name: casino-support
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.15.0 && pnpm install --frozen-lockfile && pnpm --filter @casino/support... build
    startCommand: cd apps/support && pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
