services:
  - type: web
    name: casino-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.15.0 && pnpm install --frozen-lockfile && pnpm --filter @casino/web build
    startCommand: cd apps/web && pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_DEMO_MODE
        sync: false
